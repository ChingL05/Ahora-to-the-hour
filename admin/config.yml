# Decap CMS configuration for Ahora — GitHub backend
# Editing happens in the /admin form; Decap commits to this GitHub repo,
# and Netlify rebuilds the live site automatically.

backend:
  name: github
  repo: ChingL05/Ahora-to-the-hour
  branch: main
  # The OAuth handshake is served by this site's own Netlify functions:
  base_url: https://ahora-to-the-hour.netlify.app
  auth_endpoint: /.netlify/functions/auth

# Publishing: every blog and every photo carries its own Status — "Draft" or
# "Ready". Saving only stores your work; nothing marked Draft is shown on the live
# site. When you have several pieces finished, set each to "Ready" — they all go
# live together on the next publish (the build only includes the Ready ones).

# Where uploaded photos are stored, and how they're referenced in the content.
media_folder: "photos/web"
public_folder: "photos/web"

collections:
  # ---- The Album: a single shared file, edited in place (no draft step) ----
  - name: "site"
    label: "Album"
    files:
      - name: "content"
        label: "The Album"
        file: "content.json"
        description: "Add, reorder, or archive the photographs in the album. New photos start as Draft — set them to Ready to publish them (all Ready photos go live together)."
        fields:
          - label: "Album (photos)"
            name: "album"
            widget: "list"
            label_singular: "Photo"
            summary: "{{fields.status}} · {{fields.caption}}"
            collapsed: true          # keep the list tidy — each photo shows its status + caption on one line
            fields:
              - { label: "Photo", name: "image", widget: "image" }
              - { label: "Status", name: "status", widget: "select", options: ["Draft", "Ready"], default: "Draft", hint: "Draft = kept off the live site. Ready = published on the next publish. Set several to Ready to release them together." }
              - { label: "Caption", name: "caption", widget: "string", required: false, hint: "Shown beneath the photo." }
              - { label: "Alt text", name: "alt", widget: "string", required: false, hint: "A plain description of the image, for screen readers." }
              - { label: "Archived", name: "archived", widget: "boolean", default: false, required: false, hint: "On = hidden from the front page, shown only in the Archive." }

  # ---- Blogs: one file per blog, so each can be drafted independently ----
  - name: "blogs"
    label: "Blogs"
    label_singular: "Blog"
    folder: "content/blogs"
    create: true
    format: "json"
    slug: "{{slug}}"
    identifier_field: "title"
    summary: "{{fields.order}} · {{fields.title}}"   # tidy one-line summary in the list
    sortable_fields: ["order", "title"]
    description: "Write a blog. Leave it as Draft while you work — it stays off the live site. Set it to Ready when it's done; all Ready blogs publish together on the next publish."
    fields:
      - { label: "Status", name: "status", widget: "select", options: ["Draft", "Ready"], default: "Draft", hint: "Draft = kept off the live site. Ready = published on the next publish. Set several to Ready to release them together." }
      - { label: "Small label", name: "label", widget: "string", hint: "e.g. Note 04" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Body", name: "body", widget: "text", hint: "Leave a blank line between paragraphs." }
      - { label: "Closing aside (optional)", name: "aside", widget: "string", required: false, hint: "Shown in italic automatically. To make a word bold, wrap it in **double asterisks** — e.g. it was **never** empty. (Single *asterisks* also force italic.)" }
      - { label: "Order", name: "order", widget: "number", value_type: "int", default: 0, required: false, hint: "Lower numbers appear first in the book." }
      - { label: "Featured", name: "featured", widget: "boolean", default: false, required: false, hint: "On = highlighted in the 'Featured' strip above the Blogs. Up to 3 — extras beyond 3 are ignored. Ignored while Archived." }
      - { label: "Archived", name: "archived", widget: "boolean", default: false, required: false, hint: "On = hidden from the front page, shown only in the Archive." }
